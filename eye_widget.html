<style>
    /* Estilos do Olho - Escondido por padrão (Mobile first) */
    .eye-socket-widget {
        display: none;
    }

    /* Exibir apenas em Desktop (telas maiores que 768px) */
    @media (min-width: 769px) {
        .eye-socket-widget {
            display: flex;
            position: fixed;
            bottom: 40px;
            right: 30px;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px solid #333;
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        /* Íris */
        .iris-widget {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #2c5d72 0%, #1a3a4a 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
            background-image: 
                repeating-conic-gradient(from 0deg, transparent 0deg 2deg, rgba(255,255,255,0.05) 3deg 4deg),
                radial-gradient(circle, #2c5d72 0%, #1a3a4a 100%);
        }

        /* Pupila */
        .pupil-widget {
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 50%;
            position: absolute;
        }

        /* Reflexo */
        .reflexo-widget {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 25%;
            height: 25%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(1px);
        }

        /* Pálpebra para piscar */
        .palpebra-widget {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            top: -100%;
            left: 0;
            z-index: 10;
            transition: top 0.1s ease-in-out;
        }

        .eye-socket-widget.blink .palpebra-widget {
            top: 0;
        }
    }
</style>

<div class="eye-socket-widget" id="qEyeSocket">
    <div class="palpebra-widget"></div>
    <div class="iris-widget" id="qIris">
        <div class="pupil-widget" id="qPupil"></div>
        <div class="reflexo-widget"></div>
    </div>
</div>

<script>
    (function() {
        const socket = document.getElementById('qEyeSocket');
        const iris = document.getElementById('qIris');
        const pupil = document.getElementById('qPupil');

        // Só executa a lógica se o elemento estiver visível (Desktop)
        if (window.getComputedStyle(socket).display !== 'none') {
            document.addEventListener('mousemove', (e) => {
                const rect = socket.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;

                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                
                const irisMax = 15;
                const pupilMax = 6;

                const ix = Math.cos(angle) * irisMax;
                const iy = Math.sin(angle) * irisMax;
                const px = Math.cos(angle) * pupilMax;
                const py = Math.sin(angle) * pupilMax;

                iris.style.transform = `translate(${ix}px, ${iy}px)`;
                pupil.style.transform = `translate(${px}px, ${py}px)`;
            });

            function doBlink() {
                socket.classList.add('blink');
                setTimeout(() => socket.classList.remove('blink'), 120);
                setTimeout(doBlink, Math.random() * 5000 + 2000);
            }
            setTimeout(doBlink, 4000);
        }
    })();
</script>
